<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>像素贪吃蛇 · Retro Snake</title>
  <style>
    :root {
      --bg: #14120f;
      --panel: #1f1a14;
      --line: #3b3125;
      --text: #f2e5c2;
      --muted: #b29b6f;
      --green: #70d97d;
      --green-d: #366940;
      --food: #e86f6f;
      --food-d: #8c3f3f;
      --accent: #e7be68;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 10%, #2a231b 0%, transparent 45%),
        radial-gradient(circle at 85% 90%, #2d241a 0%, transparent 40%),
        var(--bg);
      color: var(--text);
      font-family: "Courier New", Consolas, monospace;
      padding: 20px;
    }

    .wrap {
      width: min(92vw, 620px);
      border: 4px solid var(--line);
      background: linear-gradient(180deg, #211b14, #17130f);
      box-shadow: 0 18px 60px rgba(0,0,0,.45);
      padding: 16px;
    }

    .title {
      margin: 0 0 10px;
      text-align: center;
      letter-spacing: 2px;
      font-size: clamp(22px, 4vw, 30px);
      color: var(--accent);
      text-shadow: 2px 2px 0 #5d4720;
    }

    .sub {
      margin: 0 0 14px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .box {
      border: 2px solid var(--line);
      background: var(--panel);
      padding: 8px 10px;
      text-align: center;
    }

    .box b { color: var(--accent); }

    canvas {
      width: 100%;
      max-width: 560px;
      aspect-ratio: 1;
      display: block;
      margin: 0 auto;
      image-rendering: pixelated;
      border: 4px solid var(--line);
      background: #0f0d0b;
    }

    .controls {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    button {
      border: 2px solid var(--line);
      background: #2a2117;
      color: var(--text);
      padding: 8px 14px;
      font-family: inherit;
      cursor: pointer;
    }

    button:hover { filter: brightness(1.08); }

    .tips {
      margin-top: 12px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1 class="title">PIXEL SNAKE</h1>
    <p class="sub">复古像素风 · 经典玩法</p>

    <section class="hud">
      <div class="box">分数<br><b id="score">0</b></div>
      <div class="box">最高分<br><b id="best">0</b></div>
      <div class="box">状态<br><b id="state">待开始</b></div>
    </section>

    <canvas id="game" width="560" height="560" aria-label="snake game"></canvas>

    <div class="controls">
      <button id="startBtn">开始 / 重开</button>
      <button id="pauseBtn">暂停 / 继续</button>
      <button id="speedBtn">速度: 标准</button>
    </div>

    <p class="tips">
      键盘：↑↓←→ 或 WASD 控制移动，空格暂停。<br>
      手机：在画布上滑动控制方向。
    </p>
  </main>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const stateEl = document.getElementById('state');

    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const speedBtn = document.getElementById('speedBtn');

    const GRID = 28;
    const CELL = canvas.width / GRID;

    const SPEEDS = [
      { name: '悠闲', ms: 140 },
      { name: '标准', ms: 105 },
      { name: '疾速', ms: 78 }
    ];
    let speedIndex = 1;

    let snake, dir, nextDir, food, score, best, running, paused, gameOver, timer;

    function init() {
      best = Number(localStorage.getItem('pixel-snake-best') || 0);
      bestEl.textContent = best;
      reset();
      draw();
    }

    function reset() {
      snake = [
        { x: 12, y: 14 },
        { x: 11, y: 14 },
        { x: 10, y: 14 }
      ];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      food = spawnFood();
      score = 0;
      scoreEl.textContent = score;
      running = false;
      paused = false;
      gameOver = false;
      setState('待开始');
      clearInterval(timer);
    }

    function setState(s) { stateEl.textContent = s; }

    function spawnFood() {
      while (true) {
        const p = { x: Math.floor(Math.random() * GRID), y: Math.floor(Math.random() * GRID) };
        if (!snake.some(s => s.x === p.x && s.y === p.y)) return p;
      }
    }

    function startGame() {
      reset();
      running = true;
      setState('进行中');
      timer = setInterval(tick, SPEEDS[speedIndex].ms);
      draw();
    }

    function togglePause() {
      if (!running || gameOver) return;
      paused = !paused;
      setState(paused ? '已暂停' : '进行中');
    }

    function tick() {
      if (!running || paused || gameOver) return;

      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      if (head.x < 0 || head.y < 0 || head.x >= GRID || head.y >= GRID) {
        endGame();
        return;
      }

      if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
        endGame();
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreEl.textContent = score;
        if (score > best) {
          best = score;
          localStorage.setItem('pixel-snake-best', String(best));
          bestEl.textContent = best;
        }
        food = spawnFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function endGame() {
      gameOver = true;
      running = false;
      clearInterval(timer);
      setState('游戏结束');
      draw();
      overlayText('GAME OVER', '按“开始 / 重开”再来一局');
    }

    function drawGrid() {
      ctx.fillStyle = '#0f0d0b';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let y = 0; y < GRID; y++) {
        for (let x = 0; x < GRID; x++) {
          if ((x + y) % 2 === 0) {
            ctx.fillStyle = '#13100d';
            ctx.fillRect(x * CELL, y * CELL, CELL, CELL);
          }
        }
      }
    }

    function drawSnake() {
      snake.forEach((seg, i) => {
        ctx.fillStyle = i === 0 ? getComputedStyle(document.documentElement).getPropertyValue('--green') : getComputedStyle(document.documentElement).getPropertyValue('--green-d');
        ctx.fillRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2);

        if (i === 0) {
          ctx.fillStyle = '#102012';
          const eye = Math.max(2, Math.floor(CELL / 8));
          const ox = dir.x === 1 ? CELL - 10 : dir.x === -1 ? 4 : 6;
          const oy = dir.y === 1 ? CELL - 10 : dir.y === -1 ? 4 : 6;
          ctx.fillRect(seg.x * CELL + ox, seg.y * CELL + oy, eye, eye);
          ctx.fillRect(seg.x * CELL + CELL - ox - eye, seg.y * CELL + oy, eye, eye);
        }
      });
    }

    function drawFood() {
      ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--food-d');
      ctx.fillRect(food.x * CELL + 1, food.y * CELL + 1, CELL - 2, CELL - 2);
      ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--food');
      ctx.fillRect(food.x * CELL + 5, food.y * CELL + 5, CELL - 10, CELL - 10);
    }

    function draw() {
      drawGrid();
      drawSnake();
      drawFood();

      if (!running && !gameOver) {
        overlayText('RETRO SNAKE', '点击开始，或按方向键直接开局');
      }
      if (paused) {
        overlayText('PAUSED', '空格 或 按钮继续');
      }
    }

    function overlayText(t1, t2) {
      ctx.fillStyle = 'rgba(0,0,0,.45)';
      ctx.fillRect(0, canvas.height / 2 - 44, canvas.width, 88);
      ctx.fillStyle = '#f6d99b';
      ctx.textAlign = 'center';
      ctx.font = 'bold 28px Courier New';
      ctx.fillText(t1, canvas.width / 2, canvas.height / 2 - 6);
      ctx.fillStyle = '#e7c27c';
      ctx.font = '14px Courier New';
      ctx.fillText(t2, canvas.width / 2, canvas.height / 2 + 20);
    }

    function setDirection(nx, ny) {
      if (!running) {
        startGame();
      }
      if ((nx === -dir.x && ny === -dir.y) || (nx === -nextDir.x && ny === -nextDir.y)) return;
      nextDir = { x: nx, y: ny };
    }

    window.addEventListener('keydown', (e) => {
      const k = e.key.toLowerCase();
      if (k === 'arrowup' || k === 'w') setDirection(0, -1);
      else if (k === 'arrowdown' || k === 's') setDirection(0, 1);
      else if (k === 'arrowleft' || k === 'a') setDirection(-1, 0);
      else if (k === 'arrowright' || k === 'd') setDirection(1, 0);
      else if (k === ' ') {
        e.preventDefault();
        togglePause();
      }
    });

    let touchStart = null;
    canvas.addEventListener('touchstart', (e) => {
      const t = e.changedTouches[0];
      touchStart = { x: t.clientX, y: t.clientY };
    }, { passive: true });

    canvas.addEventListener('touchend', (e) => {
      if (!touchStart) return;
      const t = e.changedTouches[0];
      const dx = t.clientX - touchStart.x;
      const dy = t.clientY - touchStart.y;
      const ax = Math.abs(dx), ay = Math.abs(dy);
      if (Math.max(ax, ay) < 18) return;
      if (ax > ay) setDirection(dx > 0 ? 1 : -1, 0);
      else setDirection(0, dy > 0 ? 1 : -1);
      touchStart = null;
    }, { passive: true });

    startBtn.addEventListener('click', startGame);
    pauseBtn.addEventListener('click', togglePause);
    speedBtn.addEventListener('click', () => {
      speedIndex = (speedIndex + 1) % SPEEDS.length;
      speedBtn.textContent = `速度: ${SPEEDS[speedIndex].name}`;
      if (running && !gameOver) {
        clearInterval(timer);
        timer = setInterval(tick, SPEEDS[speedIndex].ms);
      }
    });

    init();
  </script>
</body>
</html>
