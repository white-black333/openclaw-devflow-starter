<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenClaw DevFlow Starter</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 820px; margin: 40px auto; padding: 0 16px; }
    input, button { padding: 8px; }
    li { margin: 6px 0; }
  </style>
</head>
<body>
  <h1>OpenClaw 全栈流水线模板</h1>
  <p>前端 + Python API + SQLite（演示环境）</p>

  <h3>新增任务</h3>
  <input id="title" placeholder="输入任务标题" />
  <button onclick="addTask()">添加</button>

  <h3>任务列表</h3>
  <ul id="list"></ul>

  <script>
    async function loadTasks(){
      const r = await fetch('/api/tasks');
      const data = await r.json();
      const ul = document.getElementById('list');
      ul.innerHTML = '';
      data.tasks.forEach(t => {
        const li = document.createElement('li');
        li.textContent = `#${t.id} ${t.title} (${t.created_at})`;
        ul.appendChild(li);
      });
    }
    async function addTask(){
      const title = document.getElementById('title').value.trim();
      if(!title) return;
      await fetch('/api/tasks', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({title})
      });
      document.getElementById('title').value='';
      loadTasks();
    }
    loadTasks();
  </script>
</body>
</html>
